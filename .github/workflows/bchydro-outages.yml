name: BC Hydro Outages

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  run-bchydro:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y krb5-user libkrb5-dev

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Create virtual environment and install dependencies
        run: |
          python -m venv venv
          ./venv/bin/python -m pip install --upgrade pip
          ./venv/bin/pip install -r requirements.txt

      - name: Run BC Hydro script
        run: ./venv/bin/python bchydro-outages/bchydro_outages.py
        env:
          AGO_PORTAL_URL: ${{ secrets.AGO_PORTAL_URL }}
          AGO_USER: ${{ secrets.AGO_USER }}
          AGO_PASS: ${{ secrets.AGO_PASS }}
          HYDROOUTAGES_ITEMID: ${{ secrets.HYDROOUTAGES_ITEMID }}
          HYDROOUTAGES_LFN_ITEMID: ${{ secrets.HYDROOUTAGES_LFN_ITEMID }}
