name: Avalanche Canada Forecasts

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Set up Conda environment
      uses: conda-incubator/setup-miniconda@v2
      with:
        activate-environment: bier-env
        python-version: 3.9

    - name: Install dependencies
      shell: bash
      run: |
        conda env update --file Avalanche-Canada-Forecasts/environment.yaml --name bier-env
        conda env list
        conda init bash
        . ~/.bashrc
        conda activate bier-env

    - name: Add BIER module to Path
      shell: bash
      run: |
         echo "$GITHUB_WORKSPACE/bier/bier.py" >> $GITHUB_PATH
        
    - name: Run script
      shell: bash
      env:
        AGO_PORTAL_URL: ${{secrets.AGO_PORTAL_URL}}
        AGO_USER: ${{secrets.AGO_USER}}
        AGO_PASS: ${{secrets.AGO_PASS}}
        AVALANCHEFORECAST_ITEMID: ${{secrets.AVALANCHEFORECAST_ITEMID}}
      run: |
        # you may have to activate the environment before running the 
        # python script, and you likley need to say python3 vs just python
        conda init bash
        . ~/.bashrc
        conda activate bier_env
        python3 Avalanche-Canada-Forecasts/Avalanche_Canada_Forecasts.py
