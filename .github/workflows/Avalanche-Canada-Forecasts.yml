name: Avalanche Canada Forecasts

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v2
      with:
        python-version: 3.11

    - name: Create conda environment
      run: |
        conda env create -f Avalanche-Canada-Forecasts/requirements.yaml
        conda init
        conda activate bier_env

    - name: Run script
      shell: bash
      env:
        AGO_PORTAL_URL: ${{secrets.AGO_PORTAL_URL}}
        AGO_USER: ${{secrets.AGO_USER}}
        AGO_PASS: ${{secrets.AGO_PASS}}
        AVALANCHEFORECAST_ITEMID: ${{secrets.AVALANCHEFORECAST_ITEMID}}
      run: |
        conda run -n bier_env python Avalanche-Canada-Forecasts/Avalanche_Canada_Forecasts.py
