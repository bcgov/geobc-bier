name: Avalanche Canada Forecasts

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.11
      uses: actions/setup-python@v3
      with:
        python-version: "3.11"
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r Avalanche-Canada-Forecasts/requirements.txt
        
    - name: Run script
      shell: bash
      env:
        AGO_PORTAL_URL: ${{secrets.AGO_PORTAL_URL}}
        AGO_USER: ${{secrets.AGO_USER}}
        AGO_PASS: ${{secrets.AGO_PASS}}
        AVALANCHEFORECAST_ITEMID: ${{secrets.AVALANCHEFORECAST_ITEMID}}
      run: |
        python Avalanche-Canada-Forecasts/Avalanche_Canada_Forecasts.py
